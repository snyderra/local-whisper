name: Documentation Pages

on:
  push:
    branches: [main]
    paths:
      - "doc/**"
      - "install.sh"
      - "appcast/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build Mintlify export
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Mintlify CLI
        run: npm install -g mint

      - name: Validate docs
        working-directory: doc
        run: mint validate

      - name: Check docs links
        working-directory: doc
        run: mint broken-links

      - name: Export docs
        working-directory: doc
        run: |
          mkdir -p ../_site
          mint export --output ../_site/local-whisper-docs.zip
          unzip -q ../_site/local-whisper-docs.zip -d ../_site
          rm ../_site/local-whisper-docs.zip
          cp ../install.sh ../_site/install.sh
          cp ../appcast/appcast.xml ../_site/appcast.xml

      - name: Prepare project Pages paths
        run: node doc/scripts/prepare-github-pages.mjs _site "/${{ github.event.repository.name }}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
